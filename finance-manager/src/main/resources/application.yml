spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ceshi1?useSSL=false&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  security:
    user:
      name: root
      password: ${DB_PASSWORD:123456}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.finance.manager.entity
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

jwt:
  secret: finance_manager_secret_key_2024_secure_key_for_jwt_token_generation
  expiration: 86400000